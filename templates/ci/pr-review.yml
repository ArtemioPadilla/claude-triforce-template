# Agent Triforce -- PR Security Review
# Runs Centinela security review on changed files for every pull request.
# Posts findings as a PR comment. Fails the check if Critical/High severity found.
#
# Installation:
#   Copy this file to .github/workflows/pr-review.yml
#
# Requirements:
#   - ANTHROPIC_API_KEY secret set in your repository
#   - Claude Code GitHub Action (anthropic/claude-code-action@v1)

name: "Agent Triforce: PR Review"

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  centinela-review:
    name: Centinela Security Review
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Changed files: $FILES"

      - name: Run Centinela PR Review
        id: review
        uses: anthropic/claude-code-action@v1
        with:
          model: claude-haiku-4-5-20250514
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are Centinela (QA) from the Agent Triforce system running in CI mode.
            Review the following changed files for security issues and code quality:
            ${{ steps.changed.outputs.files }}

            Focus on:
            1. Hardcoded secrets, API keys, credentials
            2. SQL injection, XSS, command injection patterns
            3. Unsafe deserialization or eval usage
            4. Missing input validation at system boundaries
            5. Authentication and authorization gaps

            For each finding, report:
            - Severity: Critical | High | Medium | Low
            - File and line number
            - Description of the issue
            - Suggested remediation

            End with a summary: total findings by severity.
            If any Critical or High findings exist, state: "REVIEW: CHANGES REQUIRED"
            If only Medium/Low findings: "REVIEW: APPROVED WITH CONDITIONS"
            If no findings: "REVIEW: APPROVED"

      - name: Post review comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## Agent Triforce -- Centinela Security Review\n\n` +
              `${{ steps.review.outputs.result }}`.replace(/`/g, '\\`');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.substring(0, 65536)
            });

      - name: Check for blockers
        if: always()
        run: |
          RESULT="${{ steps.review.outputs.result }}"
          if echo "$RESULT" | grep -q "CHANGES REQUIRED"; then
            echo "::error::Critical or High severity findings detected. Review required."
            exit 1
          fi
          echo "No blocking findings detected."
